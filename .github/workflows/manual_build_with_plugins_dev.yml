name: Manual build with plugins Dev

on:
  workflow_dispatch:
    inputs:
      system:
        type: choice
        description: 'Package OS'
        required: true
        options:
          - deb
          - rpm
        default: 'deb'
      architecture:
        type: choice
        description: 'Architecture'
        required: true
        options:
          - amd64
          - arm64
        default: 'amd64'
      revision:
        type: string
        description: 'Package revision'
        required: true
        default: '1'
      reference_dashboard:
        type: string
        description: 'Branch/tag of wazuh-dashboard repo. If empty, uses the branch this workflow is on'
        required: false
      reference_security_plugins:
        type: string
        description: 'Branch/tag/commit of wazuh-security-dashboards-plugin. If empty, uses master'
        required: false
      reference_wazuh_plugins:
        type: string
        description: 'Branch/tag/commit of wazuh-dashboard-plugins. If empty, uses master'
        required: false
      is_stage:
        type: boolean
        description: 'Is this a stage build? (affects naming and production flag)'
        required: true
        default: false
      reference_tag_release:
        type: string
        description: 'Release tag name for GitHub Release (e.g., v4.12.0-dev1)'
        required: true
        default: 'dev-build'

jobs:
  prepare-refs:
    runs-on: ubuntu-latest
    name: Prepare References
    outputs:
      dashboard_ref: ${{ steps.set-refs.outputs.dashboard_ref }}
      wazuh_plugins_ref: ${{ steps.set-refs.outputs.wazuh_plugins_ref }}
      security_plugins_ref: ${{ steps.set-refs.outputs.security_plugins_ref }}
      release_tag: ${{ steps.set-refs.outputs.release_tag }}
    steps:
      - name: Set effective refs
        id: set-refs
        run: |
          echo "dashboard_ref=${{ inputs.reference_dashboard || github.ref_name }}" >> $GITHUB_OUTPUT
          echo "wazuh_plugins_ref=${{ inputs.reference_wazuh_plugins || 'master' }}" >> $GITHUB_OUTPUT
          echo "security_plugins_ref=${{ inputs.reference_security_plugins || 'master' }}" >> $GITHUB_OUTPUT
          echo "release_tag=${{ inputs.reference_tag_release }}" >> $GITHUB_OUTPUT

  build-base:
    needs: prepare-refs
    uses: ./.github/workflows/reusable-build-dashboard.yml
    with:
      architecture: ${{ inputs.architecture }}
      reference: ${{ needs.prepare-refs.outputs.dashboard_ref }}

  build-main-plugins:
    needs: prepare-refs
    uses: ./.github/workflows/reusable-build-plugins.yml
    with:
      repo: 'ivmerk/wazuh-dashboard-plugins'
      reference: ${{ needs.prepare-refs.outputs.wazuh_plugins_ref }}
      artifact_prefix: 'wazuh-dashboard-plugins'

  build-security-plugin:
    needs: prepare-refs
    uses: ./.github/workflows/reusable-build-plugins.yml
    with:
      repo: 'ivmerk/wazuh-security-dashboards-plugin'
      reference: ${{ needs.prepare-refs.outputs.security_plugins_ref }}
      artifact_prefix: 'wazuh-security-dashboards-plugin'

  package-and-release:
    needs: [prepare-refs, build-base, build-main-plugins, build-security-plugin]
    runs-on: ${{ (inputs.architecture == 'arm64') && 'wz-linux-arm64' || 'ubuntu-22.04' }}
    name: Generate and Release Package
    permissions:
      contents: write # Needed for creating a release
    steps:
      - name: Checkout dev-tools
        uses: actions/checkout@v4
        with:
          repository: ivmerk/wazuh-dashboard
          ref: ${{ needs.prepare-refs.outputs.dashboard_ref }}
          path: wazuh-dashboard
          sparse-checkout: |
            dev-tools

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded artifacts
        run: |
          echo "Listing all downloaded artifacts:"
          find artifacts -type f

      - name: Prepare build script variables
        id: vars
        run: |
          set -x # Debug mode

          # Determine ARCHITECTURE_FLAG
          if [[ "${{ inputs.architecture }}" == "arm64" ]]; then
            echo "ARCHITECTURE_FLAG=--arm" >> $GITHUB_OUTPUT
          else
            echo "ARCHITECTURE_FLAG=" >> $GITHUB_OUTPUT
          fi

          # Determine PRODUCTION flag
          if [[ "${{ inputs.is_stage }}" == "true" ]]; then
            echo "PRODUCTION=--production" >> $GITHUB_OUTPUT
          else
            echo "PRODUCTION=" >> $GITHUB_OUTPUT
          fi

          # --- Locate artifacts reliably ---
          DASHBOARD_ARTIFACT_PATH=$(find artifacts/wazuh-dashboard-slim -name "wazuh-dashboard_*.tar.gz")
          PLUGINS_ARTIFACT_PATH=$(find artifacts/wazuh-dashboard-plugins -name "*.zip")
          SECURITY_PLUGIN_ARTIFACT_PATH=$(find artifacts/wazuh-security-dashboards-plugin -name "*.zip")
          
          if [ -z "$DASHBOARD_ARTIFACT_PATH" ] || [ -z "$PLUGINS_ARTIFACT_PATH" ] || [ -z "$SECURITY_PLUGIN_ARTIFACT_PATH" ]; then
            echo "::error::One or more required artifacts were not found!"
            exit 1
          fi

          echo "DASHBOARD_PATH=$DASHBOARD_ARTIFACT_PATH" >> $GITHUB_OUTPUT
          echo "PLUGINS_PATH=$PLUGINS_ARTIFACT_PATH" >> $GITHUB_OUTPUT
          echo "SECURITY_PATH=$SECURITY_PLUGIN_ARTIFACT_PATH" >> $GITHUB_OUTPUT

      - name: Build package
        run: |
          cd wazuh-dashboard/dev-tools/build-packages
          bash ./build-packages.sh \
            -r ${{ inputs.revision }} ${{ steps.vars.outputs.ARCHITECTURE_FLAG }} \
            -b "file://${{ github.workspace }}/${{ steps.vars.outputs.DASHBOARD_PATH }}" \
            -a "file://${{ github.workspace }}/${{ steps.vars.outputs.PLUGINS_PATH }}" \
            -s "file://${{ github.workspace }}/${{ steps.vars.outputs.SECURITY_PATH }}" \
            --${{ inputs.system }} ${{ steps.vars.outputs.PRODUCTION }} --debug

      - name: Find generated package
        id: find-package
        run: |
          PACKAGE_PATH=$(find ${{ github.workspace }}/wazuh-dashboard/dev-tools/build-packages/output -name "*.deb" -o -name "*.rpm")
          if [ -z "$PACKAGE_PATH" ]; then
            echo "::error::Generated package not found!"
            exit 1
          fi
          echo "path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename "$PACKAGE_PATH")" >> $GITHUB_OUTPUT
          
      - name: Upload final package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find-package.outputs.name }}
          path: ${{ steps.find-package.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.reference_tag_release != 'dev-build' # Don't create releases for every dev build
        with:
          tag_name: ${{ needs.prepare-refs.outputs.release_tag }}
          name: Wazuh Dashboard Release ${{ needs.prepare-refs.outputs.release_tag }}
          files: ${{ steps.find-package.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}
